name: M3U8 Scraper - Otomatik Güncelleme

on:
  # Her 30 dakikada bir çalıştır
  schedule:
    - cron: '*/30 * * * *'
  
  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Taranacak URL'
        required: false
        default: ''

# İzinler
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Kodu çek
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Python kur
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Chrome kur (Selenium için)
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 4. Bağımlılıkları yükle
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Scraper'ı çalıştır
      - name: Run Scraper
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || '' }}
        run: |
          if [ -n "$TARGET_URL" ]; then
            python scraper.py --once --url "$TARGET_URL"
          else
            python scraper.py --once
          fi

      # 6. Değişiklikleri commit et
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Değişiklik var mı kontrol et
          if git diff --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git add channels.m3u channels.json scraper.log
            
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            CHANNEL_COUNT=$(grep -c "^#EXTINF" channels.m3u 2>/dev/null || echo "0")
            
            git commit -m "🔄 Otomatik güncelleme: ${TIMESTAMP} | ${CHANNEL_COUNT} kanal"
            git push
            
            echo "✓ Değişiklikler push edildi (${CHANNEL_COUNT} kanal)"
          fi

      # 7. Sonuç özeti
      - name: Summary
        if: always()
        run: |
          echo "## 📺 Tarama Sonuçları" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f channels.m3u ]; then
            TOTAL=$(grep -c "^#EXTINF" channels.m3u 2>/dev/null || echo "0")
            echo "- **Toplam Kanal:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
            echo "- **Güncelleme:** $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ M3U dosyası oluşturulamadı" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f scraper.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Son Log Satırları" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 scraper.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
