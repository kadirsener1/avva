#!/usr/bin/env python3
import re
import time
import requests
from datetime import datetime
from bs4 import BeautifulSoup
from urllib.parse import urljoin, urlparse

# ========== AYARLAR ==========
TARGET_URL = "https://avvasportshd1.com/channels.html"  # <-- DEĞİŞTİR
OUTPUT_FILE = "channels.m3u"
USE_SELENIUM = True  # False yaparak selenium'u kapatabilirsin
# =============================

HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36'
}

M3U8_PATTERN = re.compile(r'https?://[^\s\"\'\<\>\}\]\)]+\.m3u8[^\s\"\'\<\>\}\]\)]*', re.I)


def get_page_selenium(url):
    """Selenium ile sayfa al"""
    try:
        from selenium import webdriver
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.chrome.service import Service
        from webdriver_manager.chrome import ChromeDriverManager
        
        options = Options()
        options.add_argument('--headless')
        options.add_argument('--no-sandbox')
        options.add_argument('--disable-dev-shm-usage')
        options.add_argument('--disable-gpu')
        options.add_argument(f'--user-agent={HEADERS["User-Agent"]}')
        
        driver = webdriver.Chrome(
            service=Service(ChromeDriverManager().install()),
            options=options
        )
        driver.set_page_load_timeout(30)
        driver.get(url)
        time.sleep(5)
        html = driver.page_source
        driver.quit()
        return html
    except Exception as e:
        print(f"Selenium hatası: {e}")
        return None


def get_page_requests(url):
    """Requests ile sayfa al"""
    try:
        r = requests.get(url, headers=HEADERS, timeout=20)
        return r.text
    except Exception as e:
        print(f"Request hatası: {e}")
        return None


def get_page(url):
    """Sayfa içeriğini al"""
    if USE_SELENIUM:
        html = get_page_selenium(url)
        if html:
            return html
    return get_page_requests(url)


def find_m3u8_links(html, base_url):
    """HTML içinden m3u8 linklerini bul"""
    links = set()
    
    if not html:
        return links
    
    # Regex ile bul
    for match in M3U8_PATTERN.finditer(html):
        url = match.group(0).strip('"\'')
        links.add(url)
    
    # BeautifulSoup ile script ve iframe tara
    try:
        soup = BeautifulSoup(html, 'lxml')
        
        # Script tagları
        for script in soup.find_all('script'):
            text = script.string or ''
            for match in M3U8_PATTERN.finditer(text):
                links.add(match.group(0).strip('"\''))
        
        # Video/source tagları
        for tag in soup.find_all(['video', 'source']):
            src = tag.get('src', '') or tag.get('data-src', '')
            if '.m3u8' in src:
                if src.startswith('//'):
                    src = 'https:' + src
                elif src.startswith('/'):
                    src = urljoin(base_url, src)
                links.add(src)
        
        # iframe'ler
        for iframe in soup.find_all('iframe'):
            src = iframe.get('src', '') or iframe.get('data-src', '')
            if src and not src.startswith('about:'):
                iframe_url = urljoin(base_url, src)
                print(f"  iframe: {iframe_url}")
                iframe_html = get_page(iframe_url)
                if iframe_html:
                    sub_links = find_m3u8_links(iframe_html, iframe_url)
                    links.update(sub_links)
                time.sleep(1)
                
    except Exception as e:
        print(f"Parse hatası: {e}")
    
    return links


def check_alive(url):
    """Link canlı mı?"""
    try:
        r = requests.head(url, headers=HEADERS, timeout=8, allow_redirects=True)
        if r.status_code == 200:
            return True
        r = requests.get(url, headers=HEADERS, timeout=8, stream=True)
        return r.status_code == 200
    except:
        return False


def url_to_name(url):
    """URL'den isim çıkar"""
    path = urlparse(url).path
    parts = path.split('/')
    for p in reversed(parts):
        name = p.replace('.m3u8', '').replace('-', ' ').replace('_', ' ').strip()
        if name and len(name) > 1 and not name.isdigit():
            if name.lower() not in ['index', 'playlist', 'live', 'stream', 'hls', 'video']:
                return name.title()
    return urlparse(url).netloc.split('.')[0].title()


def save_m3u(channels):
    """M3U kaydet"""
    with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
        f.write('#EXTM3U\n')
        f.write(f'# Updated: {datetime.now().strftime("%Y-%m-%d %H:%M:%S")}\n')
        f.write(f'# Source: {TARGET_URL}\n')
        f.write(f'# Channels: {len(channels)}\n\n')
        
        for name, url, alive in sorted(channels):
            group = "Active" if alive else "Unknown"
            f.write(f'#EXTINF:-1 group-title="{group}",{name}\n')
            f.write(f'{url}\n\n')
    
    print(f"✓ Saved {len(channels)} channels to {OUTPUT_FILE}")


def main():
    print("=" * 50)
    print(f"M3U8 Scraper - {datetime.now()}")
    print(f"Target: {TARGET_URL}")
    print("=" * 50)
    
    # Sayfa al
    print("\n[1] Fetching page...")
    html = get_page(TARGET_URL)
    
    if not html:
        print("Failed to fetch page!")
        return
    
    # Linkleri bul
    print("\n[2] Finding m3u8 links...")
    links = find_m3u8_links(html, TARGET_URL)
    print(f"Found {len(links)} links")
    
    if not links:
        print("No links found!")
        # Boş M3U oluştur
        with open(OUTPUT_FILE, 'w') as f:
            f.write(f'#EXTM3U\n# No channels found - {datetime.now()}\n')
        return
    
    # Kontrol et
    print("\n[3] Checking streams...")
    channels = []
    for url in links:
        name = url_to_name(url)
        alive = check_alive(url)
        status = "✓" if alive else "✗"
        print(f"  {status} {name}")
        channels.append((name, url, alive))
    
    # Kaydet
    print("\n[4] Saving...")
    save_m3u(channels)
    
    print("\n" + "=" * 50)
    print("Done!")


if __name__ == '__main__':
    main()
